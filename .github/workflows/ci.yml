name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: Foundry tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install libraries
        working-directory: contracts
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts
      - name: Run tests
        working-directory: contracts
        run: forge test -vv

  typecheck:
    name: SDK build and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --filter x402-arc build
      - run: pnpm --filter x402-arc test
      - run: pnpm --filter facilitator typecheck
